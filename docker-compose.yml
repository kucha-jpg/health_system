services:
  mysql:
    image: ${IMAGE_PREFIX:-docker.m.daocloud.io/library/}mysql:8.0
    container_name: health-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: health_system
      TZ: Asia/Shanghai
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20


  redis:
    image: ${IMAGE_PREFIX:-docker.m.daocloud.io/library/}redis:7-alpine
    container_name: health-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        IMAGE_PREFIX: ${IMAGE_PREFIX:-docker.m.daocloud.io/library/}
    container_name: health-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: health_system
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: healthSystemSecretKeyhealthSystemSecretKey
      JWT_EXPIRATION: 86400000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "9090:9090"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        IMAGE_PREFIX: ${IMAGE_PREFIX:-docker.m.daocloud.io/library/}
    container_name: health-frontend
    environment:
      VITE_API_TARGET: http://backend:9090
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
