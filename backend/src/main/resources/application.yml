spring:
  profiles:
    active: dev
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    clean-disabled: true
  cache:
    type: redis
    redis:
      time-to-live: 5m
      cache-null-values: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:healthSystemSecretKeyhealthSystemSecretKey}
  expiration: ${JWT_EXPIRATION:86400000}

security:
  data:
    aes-key: ${APP_DATA_AES_KEY:}
