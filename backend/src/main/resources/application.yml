spring:
  profiles:
    active: dev
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    clean-disabled: true
  cache:
    type: redis
    redis:
      time-to-live: 5m
      cache-null-values: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:healthSystemSecretKeyhealthSystemSecretKey}
  expiration: ${JWT_EXPIRATION:86400000}

security:
  data:
    aes-key: ${APP_DATA_AES_KEY:}
  jwt:
    fail-fast-on-weak-secret-in-prod: ${JWT_FAIL_FAST_ON_WEAK_SECRET_IN_PROD:true}
    min-secret-length: ${JWT_MIN_SECRET_LENGTH:32}
  auth-rate-limit:
    strategy: ${AUTH_RATE_LIMIT_STRATEGY:auto}
    max-requests: ${AUTH_RATE_LIMIT_MAX_REQUESTS:10}
    window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
    cleanup-interval-seconds: ${AUTH_RATE_LIMIT_CLEANUP_INTERVAL_SECONDS:300}
