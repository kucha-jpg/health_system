name: quality-gate

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
    paths:
      - "backend/**"
      - "scripts/**"
      - "docs/**"
      - ".github/workflows/quality-gate.yml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "backend/**"
      - "scripts/**"
      - "docs/**"
      - ".github/workflows/quality-gate.yml"

jobs:
  backend-and-api-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Start backend dependencies
        run: docker compose up -d --build mysql backend

      - name: Wait for backend ready
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:9090/api/auth/ping || true)
            if [ "$code" = "200" ]; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend is not ready in time"
          docker compose logs backend
          exit 1

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Backend unit tests
        run: mvn -q -f backend/pom.xml test

      - name: API error-code assertions gate
        run: |
          chmod +x ./scripts/api_assert.sh
          BASE_URL=http://127.0.0.1:9090/api ./scripts/api_assert.sh

      - name: Dump service logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs mysql
          docker compose logs backend

      - name: Cleanup
        if: always()
        run: docker compose down -v
